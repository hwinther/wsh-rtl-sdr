name: Build gsm-tools container image

# Dispatched by tag-and-release.yml after a v* tag is created (push from GITHUB_TOKEN does
# not fire on.push.tags), and runnable manually for ad-hoc rebuilds. gsm-tools is FROM
# sdr-build:trixie (digest-pinned in images/gsm-tools/Dockerfile so Dependabot tracks
# base-image updates). The parent sdr-build:trixie rebuilds on its own cadence in
# build-sdr-images.yml (path changes + weekly cron + manual).
#
# Pipeline (via the reusable docker-container.yml): gitversion → buildx (multi-arch) → SBOM
# → Grype → push → cosign keyless sign → CycloneDX/vuln attestations → SLSA provenance.

on:
  workflow_dispatch:
    inputs:
      grype_fail_build:
        description: "Fail the build if Grype finds vulnerabilities"
        type: boolean
        default: true
  push:
    branches: [main]
    paths:
      - "images/gsm-tools/**"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  actions: write
  security-events: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gsm-tools:
    uses: hwinther/reusable-workflows/.github/workflows/docker-container.yml@25185e2df48cbdd90df1a8ec70b01e9911aaadbc # v1.56.0
    with:
      container_image_name_postfix: gsm-tools
      build_context: images/gsm-tools
      dockerfile: images/gsm-tools/Dockerfile
      platforms: linux/amd64,linux/arm64
      grype_fail_build: ${{ github.event_name != 'workflow_dispatch' || fromJSON(github.event.inputs.grype_fail_build || 'true') }}
