name: Build sdr-base and sdr-build container images

# Triggers — decoupled from tag-and-release.yml on purpose. The base images rarely need
# rebuilding (only when their Dockerfiles change or the upstream Debian base updates), so
# they don't share the app-image release cadence.
#
#   - workflow_dispatch: ad-hoc rebuilds, also the path for "first-ever build before any
#     consumer image (gsm-tools, feeders) exists."
#   - push to main on path changes: rebuild when the Dockerfiles or this workflow change.
#   - schedule (weekly): picks up upstream `debian:<distro>-slim` security pushes that
#     Dependabot can't auto-PR for us (Dependabot doesn't parse ARG-substituted FROMs).
#     Consumer images (gsm-tools, feeders) FROM the floating `:trixie` tag, so they pick
#     up the freshened base on their next rebuild.
#
# Pipeline (per matrix entry):
#   1. {sdr-base,sdr-build}  — docker-container.yml builds + scans + pushes (NO signing).
#      Uploads CycloneDX SBOM + Grype JSON as matrix-disambiguated workflow artifacts via
#      `artifact_name_suffix`. v1.54.0 decoupled SBOM/Grype generation from cosign signing,
#      so we can keep cosign_sign_enabled: false without losing the artifacts the sign
#      jobs need to download.
#   2. {sdr-base-sign,sdr-build-sign}  — this workflow's own jobs. Resolve the post-push
#      manifest digest from the registry, download the SBOM + Grype artifacts, call the
#      `sign-image` composite. Because the composite runs inline here (not inside the
#      reusable repo), the cosign keyless cert SAN is THIS workflow's ref:
#        https://github.com/hwinther/wsh-rtl-sdr/.github/workflows/build-sdr-images.yaml@<ref>
#
# Net result: ONE cosign signature per image with this workflow's Fulcio identity. Verify:
#   cosign verify --certificate-identity-regexp \
#     '^https://github\.com/hwinther/wsh-rtl-sdr/\.github/workflows/build-sdr-images\.yaml@' \
#     ghcr.io/hwinther/wsh-rtl-sdr/sdr-base:trixie
#
# Tagging: each matrix entry publishes a full per-distro tag set:
#   - the bare distro tag (e.g. `:trixie`, via additional_tags) — floating pointer that
#     feeders and gsm-tools consume,
#   - the gitversion-derived tags with a `-${distro}` suffix appended (e.g.
#     `:1.2.3-trixie`, `:1.2-trixie`, `:1-trixie`, `:main-trixie`) via v1.55.0's
#     tag_suffix input — race-safe across matrix entries because the distro suffix
#     disambiguates the otherwise-shared gitversion output.

on:
    workflow_dispatch:
        inputs:
            grype_fail_build:
                description: "Fail the build if Grype finds vulnerabilities"
                type: boolean
                default: true
    push:
        branches: [main]
        paths:
            - "images/sdr-base/**"
            - "images/sdr-build/**"
            - ".github/workflows/build-sdr-images.yaml"
    schedule:
        # Monday 06:00 UTC — early week so any pickup-related failures land during the
        # working week, not Friday evening. Adjust freely; the exact hour isn't load-bearing.
        - cron: "0 6 * * 1"

permissions:
    contents: read
    packages: write
    id-token: write
    attestations: write
    actions: write
    security-events: write
    pull-requests: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    # On the weekly cron trigger, compare the upstream `debian:<distro>-slim` digest against
    # the `org.opencontainers.image.base.digest` annotation buildx baked into our last
    # `sdr-base:<distro>` publish. Skip the whole rebuild when nothing upstream changed.
    # Non-cron triggers (workflow_dispatch, push) always force a rebuild.
    #
    # Fallback semantics — designed so we never silently miss a security update:
    #   - Annotation missing on our image (e.g. first-ever run) → treat as changed.
    #   - Precheck step itself fails (registry timeout, etc.) → version job's `if:` falls
    #     through to "rebuild defensively" via `needs.precheck.result == 'failure'`.
    precheck:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: read
        outputs:
            changed: ${{ steps.diff.outputs.changed }}
        steps:
            - name: Install crane
              if: github.event_name == 'schedule'
              shell: bash
              env:
                  CRANE_VERSION: v0.20.6
              run: |
                set -euo pipefail
                curl -fsSL -o /tmp/crane.tar.gz \
                    "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz"
                sudo tar -C /usr/local/bin -xzf /tmp/crane.tar.gz crane
                crane version

            - name: Authenticate to GHCR
              if: github.event_name == 'schedule'
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  ACTOR: ${{ github.actor }}
              run: echo "$GH_TOKEN" | crane auth login ghcr.io -u "$ACTOR" --password-stdin

            - name: Compare upstream vs last-built digests
              id: diff
              shell: bash
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  REPO: ${{ github.repository }}
              run: |
                set -euo pipefail
                if [ "$EVENT_NAME" != "schedule" ]; then
                    echo "Non-schedule trigger ($EVENT_NAME) — forcing rebuild."
                    echo "changed=true" >> "$GITHUB_OUTPUT"
                    exit 0
                fi
                repo_lc="${REPO,,}"
                changed=false
                missing_annotation=false
                {
                    echo "### 🔍 Upstream Debian digest precheck"
                    echo
                    echo "| Distro | Upstream digest | Last-built parent digest | Decision |"
                    echo "|---|---|---|---|"
                } >> "$GITHUB_STEP_SUMMARY"
                for d in buster bullseye bookworm trixie; do
                    upstream=$(crane digest "debian:${d}-slim")
                    last=""
                    if manifest_json=$(crane manifest "ghcr.io/${repo_lc}/sdr-base:${d}" 2>/dev/null); then
                        # Try index-level annotation first.
                        last=$(echo "$manifest_json" \
                            | jq -r '.annotations["org.opencontainers.image.base.digest"] // empty')
                        # Fall back to the amd64 per-arch manifest if the index lacks it.
                        if [ -z "$last" ]; then
                            amd64_digest=$(echo "$manifest_json" \
                                | jq -r '.manifests[]? | select(.platform.architecture == "amd64") | .digest // empty' \
                                | head -1)
                            if [ -n "$amd64_digest" ]; then
                                last=$(crane manifest "ghcr.io/${repo_lc}/sdr-base@${amd64_digest}" 2>/dev/null \
                                    | jq -r '.annotations["org.opencontainers.image.base.digest"] // empty' || echo "")
                            fi
                        fi
                    fi
                    if [ -z "$last" ]; then
                        echo "::warning::sdr-base:${d} not found or missing base.digest annotation — treating as changed."
                        echo "| ${d} | \`${upstream}\` | _(missing)_ | 🔨 rebuild |" >> "$GITHUB_STEP_SUMMARY"
                        missing_annotation=true
                        changed=true
                    elif [ "$upstream" != "$last" ]; then
                        echo "${d}: upstream=${upstream}  last=${last}  → CHANGED"
                        echo "| ${d} | \`${upstream}\` | \`${last}\` | 🔨 rebuild |" >> "$GITHUB_STEP_SUMMARY"
                        changed=true
                    else
                        echo "${d}: ${upstream}  → unchanged"
                        echo "| ${d} | \`${upstream}\` | \`${last}\` | ✅ skip |" >> "$GITHUB_STEP_SUMMARY"
                    fi
                done
                echo "changed=$changed" >> "$GITHUB_OUTPUT"
                {
                    echo
                    echo "**Result:** ${changed}"
                } >> "$GITHUB_STEP_SUMMARY"
                if [ "$missing_annotation" = "true" ]; then
                    echo "::notice::At least one image lacked the base.digest annotation; rebuilding to populate it. Subsequent cron runs should skip cleanly when upstream is unchanged."
                fi

    # Resolve one version for the whole run, then fan out into the matrix. Without this the
    # matrix entries would each run their own gitversion; same result, but one job is faster
    # and gives one canonical version string.
    version:
        needs: precheck
        # Run when: non-cron trigger (precheck short-circuits to changed=true), upstream
        # genuinely changed, or precheck failed (defensive — never silently skip).
        if: ${{ !cancelled() && (needs.precheck.result == 'failure' || needs.precheck.outputs.changed == 'true') }}
        uses: hwinther/reusable-workflows/.github/workflows/gitversion.yml@3ad0a22859d540e81f210707b744607321b5ae1b # v1.55.0

    sdr-base:
        needs: version
        strategy:
            fail-fast: false
            matrix:
                debian_release: [buster, bullseye, bookworm, trixie]
                # buster needs apt sources rewritten to archive.debian.org; other distros
                # don't need any extra build args (the empty default applies).
                include:
                    - debian_release: buster
                      extra_build_args: |
                          USE_ARCHIVE_REPOS=true
        uses: hwinther/reusable-workflows/.github/workflows/docker-container.yml@3ad0a22859d540e81f210707b744607321b5ae1b # v1.55.0
        with:
            container_image_name_postfix: sdr-base
            build_context: images/sdr-base
            dockerfile: images/sdr-base/Dockerfile
            platforms: linux/amd64,linux/arm64
            # tag_suffix appends `-${distro}` to every gitversion-derived tag, so each
            # matrix entry gets a full per-distro semver tag set (e.g. :1.2.3-trixie,
            # :1.2-trixie, :1-trixie, :main-trixie) with no cross-distro races.
            # additional_tags carries the bare distro tag (e.g. :trixie) — the floating
            # pointer feeders and gsm-tools consume.
            tag_suffix: ${{ matrix.debian_release }}
            additional_tags: ${{ matrix.debian_release }}
            artifact_name_suffix: ${{ matrix.debian_release }}
            grype_fail_build: ${{ github.event_name != 'workflow_dispatch' || fromJSON(github.event.inputs.grype_fail_build || 'true') }}
            # v1.54.0 decoupled SBOM/Grype generation from cosign signing — so we can
            # turn off reusable-side signing while still getting the predicate artifacts
            # the consumer-side sdr-base-sign job needs to download. End state: ONE
            # cosign signature per image with this workflow's Fulcio identity.
            cosign_sign_enabled: false
            attest_build_provenance_enabled: false
            build_args: |
                DEBIAN_RELEASE=${{ matrix.debian_release }}
                ${{ matrix.extra_build_args }}

    sdr-build:
        # sdr-build now FROM sdr-base, so the full sdr-base matrix must publish before
        # sdr-build can pull its parent image from GHCR. All sdr-base distros gate all
        # sdr-build distros — finer-grained per-distro pairing isn't supported by GitHub
        # Actions matrix needs:, but the simpler graph is fine for this scale.
        needs: [version, sdr-base]
        strategy:
            fail-fast: false
            matrix:
                debian_release: [buster, bullseye, bookworm, trixie]
                # buster: skip python3-build (not packaged on buster). USE_ARCHIVE_REPOS
                # is handled by sdr-base; sdr-build inherits the already-rewritten sources.
                include:
                    - debian_release: buster
                      extra_build_args: |
                          INSTALL_PYTHON_BUILD_TOOLS=false
        uses: hwinther/reusable-workflows/.github/workflows/docker-container.yml@3ad0a22859d540e81f210707b744607321b5ae1b # v1.55.0
        with:
            container_image_name_postfix: sdr-build
            build_context: images/sdr-build
            dockerfile: images/sdr-build/Dockerfile
            platforms: linux/amd64,linux/arm64
            tag_suffix: ${{ matrix.debian_release }}
            additional_tags: ${{ matrix.debian_release }}
            artifact_name_suffix: ${{ matrix.debian_release }}
            grype_fail_build: ${{ github.event_name != 'workflow_dispatch' || fromJSON(github.event.inputs.grype_fail_build || 'true') }}
            # See sdr-base above for the cosign_sign_enabled rationale.
            cosign_sign_enabled: false
            attest_build_provenance_enabled: false
            # SDR_BASE pulls sdr-base by the floating distro tag pushed by the sdr-base job
            # above. Acceptable for homelab scale; for stricter reproducibility, refactor
            # sdr-base to emit per-distro digest outputs and consume them here.
            build_args: |
                DEBIAN_RELEASE=${{ matrix.debian_release }}
                SDR_BASE=ghcr.io/hwinther/wsh-rtl-sdr/sdr-base:${{ matrix.debian_release }}
                ${{ matrix.extra_build_args }}

    # Consumer-side cosign sign + attest for each sdr-base matrix entry. Runs inline in this
    # workflow file, so the OIDC token's job_workflow_ref claim — and therefore the Fulcio
    # cert SAN — is THIS workflow's ref, not the reusable's. Adds a second cosign signature
    # and a second set of CycloneDX/vuln + provenance attestations on top of whatever the
    # reusable already published in the sdr-base job above.
    #
    # Per-matrix-entry data flow (matrix outputs from reusables are race-based, so we don't
    # rely on them — each entry looks up its own state):
    #   - Digest: `crane digest ghcr.io/.../sdr-base:${distro}` against the just-pushed tag.
    #   - CycloneDX SBOM: download the matrix-disambiguated artifact uploaded by _scan-image
    #     (name pattern from artifact_name_suffix=${{ matrix.debian_release }}).
    #   - Grype JSON: ditto, via the v1.53.0 _scan-image upload that this commit relies on.
    sdr-base-sign:
        needs: [version, sdr-base]
        if: ${{ !cancelled() && (needs.precheck.result == 'failure' || needs.precheck.outputs.changed == 'true') }}
        strategy:
            fail-fast: false
            matrix:
                debian_release: [buster, bullseye, bookworm, trixie]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write       # cosign attest publishes attestation manifests
            id-token: write       # OIDC for cosign keyless and attest-build-provenance
            attestations: write   # actions/attest-build-provenance
            actions: read         # download-artifact uses the run-scoped token
        steps:
            - name: Lower-case repo name
              id: repo
              run: echo "repository=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Install crane
              shell: bash
              env:
                  CRANE_VERSION: v0.20.6
              run: |
                set -euo pipefail
                curl -fsSL -o /tmp/crane.tar.gz \
                    "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz"
                sudo tar -C /usr/local/bin -xzf /tmp/crane.tar.gz crane
                crane version

            - name: Resolve image digest from registry
              id: digest
              shell: bash
              env:
                  IMAGE: ghcr.io/${{ steps.repo.outputs.repository }}/sdr-base:${{ matrix.debian_release }}
              run: |
                set -euo pipefail
                digest=$(crane digest "$IMAGE")
                echo "value=$digest" >> "$GITHUB_OUTPUT"
                echo "Resolved $IMAGE → $digest"

            - name: Download CycloneDX SBOM artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: container-image-sdr-base-${{ matrix.debian_release }}.cyclonedx.json
                  path: ${{ runner.temp }}/sbom

            - name: Download Grype JSON artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: container-image-sdr-base-${{ matrix.debian_release }}.grype.json
                  path: ${{ runner.temp }}/grype

            - name: Resolve predicate paths
              id: predicates
              shell: bash
              env:
                  SBOM_DIR: ${{ runner.temp }}/sbom
                  GRYPE_DIR: ${{ runner.temp }}/grype
              run: |
                set -euo pipefail
                CYCLONEDX=$(find "$SBOM_DIR" -maxdepth 2 -type f -name '*.cyclonedx.json' | head -1)
                [ -n "$CYCLONEDX" ] || { echo "::error::No CycloneDX SBOM in $SBOM_DIR"; exit 1; }
                GRYPE=$(find "$GRYPE_DIR" -maxdepth 2 -type f -name '*.grype.json' -o -name '*.json' | head -1)
                [ -n "$GRYPE" ] || { echo "::error::No Grype JSON in $GRYPE_DIR"; exit 1; }
                echo "sbom_cyclonedx_path=$CYCLONEDX" >> "$GITHUB_OUTPUT"
                echo "grype_json_path=$GRYPE" >> "$GITHUB_OUTPUT"

            - name: Sign and attest (consumer-context OIDC)
              uses: hwinther/reusable-workflows/.github/actions/sign-image@3ad0a22859d540e81f210707b744607321b5ae1b # v1.55.0
              with:
                  container_registry: ghcr.io
                  repository: ${{ steps.repo.outputs.repository }}
                  container_image_name_postfix: sdr-base
                  image_digest: ${{ steps.digest.outputs.value }}
                  # Tag format matches v1.55.0's tag_suffix convention (`${version}-${distro}`).
                  # cosign sign binds the signature to the digest the registry resolves these
                  # tags to, so all other tags pointing at the same digest (`:1.2-trixie`,
                  # `:1-trixie`, etc.) also verify against this signature.
                  container_tags: ghcr.io/${{ steps.repo.outputs.repository }}/sdr-base:${{ matrix.debian_release }},ghcr.io/${{ steps.repo.outputs.repository }}/sdr-base:${{ needs.version.outputs.version }}-${{ matrix.debian_release }}
                  sbom_cyclonedx_path: ${{ steps.predicates.outputs.sbom_cyclonedx_path }}
                  grype_json_path: ${{ steps.predicates.outputs.grype_json_path }}
                  version: ${{ needs.version.outputs.version }}
                  # Cross-job sha256 pinning and expected_image_id left empty: matrix outputs
                  # from a reusable-workflow caller aren't matrix-paired (last-wins), so we
                  # can't forward the build job's per-entry hashes/digests reliably. The
                  # SBOM-image binding check inside sign-image falls back to inspecting the
                  # syft properties in the CycloneDX; that plus the registry-resolved digest
                  # is sufficient for homelab use.

    # Mirror of sdr-base-sign for sdr-build. Same structure — only container_image_name_postfix
    # and the upstream `needs:` chain differ.
    sdr-build-sign:
        needs: [version, sdr-build]
        if: ${{ !cancelled() && (needs.precheck.result == 'failure' || needs.precheck.outputs.changed == 'true') }}
        strategy:
            fail-fast: false
            matrix:
                debian_release: [buster, bullseye, bookworm, trixie]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write
            attestations: write
            actions: read
        steps:
            - name: Lower-case repo name
              id: repo
              run: echo "repository=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Install crane
              shell: bash
              env:
                  CRANE_VERSION: v0.20.6
              run: |
                set -euo pipefail
                curl -fsSL -o /tmp/crane.tar.gz \
                    "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz"
                sudo tar -C /usr/local/bin -xzf /tmp/crane.tar.gz crane

            - name: Resolve image digest from registry
              id: digest
              shell: bash
              env:
                  IMAGE: ghcr.io/${{ steps.repo.outputs.repository }}/sdr-build:${{ matrix.debian_release }}
              run: |
                set -euo pipefail
                digest=$(crane digest "$IMAGE")
                echo "value=$digest" >> "$GITHUB_OUTPUT"
                echo "Resolved $IMAGE → $digest"

            - name: Download CycloneDX SBOM artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: container-image-sdr-build-${{ matrix.debian_release }}.cyclonedx.json
                  path: ${{ runner.temp }}/sbom

            - name: Download Grype JSON artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: container-image-sdr-build-${{ matrix.debian_release }}.grype.json
                  path: ${{ runner.temp }}/grype

            - name: Resolve predicate paths
              id: predicates
              shell: bash
              env:
                  SBOM_DIR: ${{ runner.temp }}/sbom
                  GRYPE_DIR: ${{ runner.temp }}/grype
              run: |
                set -euo pipefail
                CYCLONEDX=$(find "$SBOM_DIR" -maxdepth 2 -type f -name '*.cyclonedx.json' | head -1)
                [ -n "$CYCLONEDX" ] || { echo "::error::No CycloneDX SBOM in $SBOM_DIR"; exit 1; }
                GRYPE=$(find "$GRYPE_DIR" -maxdepth 2 -type f -name '*.grype.json' -o -name '*.json' | head -1)
                [ -n "$GRYPE" ] || { echo "::error::No Grype JSON in $GRYPE_DIR"; exit 1; }
                echo "sbom_cyclonedx_path=$CYCLONEDX" >> "$GITHUB_OUTPUT"
                echo "grype_json_path=$GRYPE" >> "$GITHUB_OUTPUT"

            - name: Sign and attest (consumer-context OIDC)
              uses: hwinther/reusable-workflows/.github/actions/sign-image@3ad0a22859d540e81f210707b744607321b5ae1b # v1.55.0
              with:
                  container_registry: ghcr.io
                  repository: ${{ steps.repo.outputs.repository }}
                  container_image_name_postfix: sdr-build
                  image_digest: ${{ steps.digest.outputs.value }}
                  container_tags: ghcr.io/${{ steps.repo.outputs.repository }}/sdr-build:${{ matrix.debian_release }},ghcr.io/${{ steps.repo.outputs.repository }}/sdr-build:${{ needs.version.outputs.version }}-${{ matrix.debian_release }}
                  sbom_cyclonedx_path: ${{ steps.predicates.outputs.sbom_cyclonedx_path }}
                  grype_json_path: ${{ steps.predicates.outputs.grype_json_path }}
                  version: ${{ needs.version.outputs.version }}
