name: Build gsm-tools container image

# Dispatched by tag-and-release.yml after a v* tag is created (push from GITHUB_TOKEN does
# not fire on.push.tags), and runnable manually for ad-hoc rebuilds. gsm-tools is FROM
# sdr-build:trixie, which rebuilds on its own cadence in build-sdr-images.yaml (path changes
# + weekly cron + manual). gsm-tools picks up whichever sdr-build:trixie was last published.
#
# Pipeline (via the reusable docker-container.yml): gitversion → buildx (multi-arch) → SBOM
# → Grype → push → cosign keyless sign → CycloneDX/vuln attestations → SLSA provenance.

on:
    workflow_dispatch:
        inputs:
            grype_fail_build:
                description: "Fail the build if Grype finds vulnerabilities"
                type: boolean
                default: true

permissions:
    contents: read
    packages: write
    id-token: write
    attestations: write
    actions: write
    security-events: write
    pull-requests: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    gsm-tools:
        uses: hwinther/reusable-workflows/.github/workflows/docker-container.yml@a6b7b1ad8c8ef6179c86e95488cb714a1e134ab8 # v1.53.0
        with:
            container_image_name_postfix: gsm-tools
            build_context: docker
            dockerfile: docker/Dockerfile
            platforms: linux/amd64,linux/arm64
            grype_fail_build: ${{ github.event_name != 'workflow_dispatch' || fromJSON(github.event.inputs.grype_fail_build || 'true') }}
