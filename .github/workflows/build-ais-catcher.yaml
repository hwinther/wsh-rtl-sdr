name: Build ais-catcher container image

# Feeder image. Unlike the ADSB feeders this one consumes upstream ghcr.io/jvde-github/ais-catcher
# directly (not sdr-base/sdr-build) — see images/ais-catcher/Dockerfile. Same trigger shape
# and pipeline as the others.

on:
    workflow_dispatch:
        inputs:
            grype_fail_build:
                description: "Fail the build if Grype finds vulnerabilities"
                type: boolean
                default: true
    push:
        branches: [main]
        paths:
            - "images/ais-catcher/**"
            - ".github/workflows/build-ais-catcher.yaml"

permissions:
    contents: read
    packages: write
    id-token: write
    attestations: write
    actions: write
    security-events: write
    pull-requests: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    ais-catcher:
        uses: hwinther/reusable-workflows/.github/workflows/docker-container.yml@3ad0a22859d540e81f210707b744607321b5ae1b # v1.55.0
        with:
            container_image_name_postfix: ais-catcher
            build_context: images/ais-catcher
            dockerfile: images/ais-catcher/Dockerfile
            platforms: linux/amd64,linux/arm64
            grype_fail_build: ${{ github.event_name != 'workflow_dispatch' || fromJSON(github.event.inputs.grype_fail_build || 'true') }}
