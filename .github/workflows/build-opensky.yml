name: Build opensky container image

# Feeder image (consumes sdr-base/sdr-build:buster — archived Debian). Triggers + pipeline
# shape match build-dump1090-fa.yml — see that file for the full Option 2 rationale.

on:
    workflow_dispatch:
        inputs:
            grype_fail_build:
                description: "Fail the build if Grype finds vulnerabilities"
                type: boolean
                default: true
    push:
        branches: [main]
        paths:
            - "images/opensky/**"
            - ".github/workflows/build-opensky.yml"

permissions:
    contents: read
    packages: write
    id-token: write
    attestations: write
    actions: write
    security-events: write
    pull-requests: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    opensky:
        uses: hwinther/reusable-workflows/.github/workflows/docker-container.yml@3ad0a22859d540e81f210707b744607321b5ae1b # v1.55.0
        with:
            container_image_name_postfix: opensky
            build_context: images/opensky
            dockerfile: images/opensky/Dockerfile
            platforms: linux/amd64,linux/arm64
            grype_fail_build: ${{ github.event_name != 'workflow_dispatch' || fromJSON(github.event.inputs.grype_fail_build || 'true') }}
