# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
- package-ecosystem: "github-actions"
  directories:
  - "/"
  open-pull-requests-limit: 20
  target-branch: "main"
  schedule:
    interval: "weekly"
    day: "monday"
  cooldown:
    default-days: 7
  groups:
    reusable-workflows:
      patterns:
      - "hwinther/reusable-workflows/*"

- package-ecosystem: "docker"
  directories:
  - "/images/adsbexchange"
  - "/images/dump1090-fa"
  - "/images/fr24"
  - "/images/opensky"
  - "/images/piaware"
  - "/images/tar1090"
  - "/images/ais-catcher"
  - "/images/adsb-mqtt"
  - "/images/sdr-base"
  - "/images/sdr-build"
  - "/images/gsm-tools"
  schedule:
    interval: "daily"
  open-pull-requests-limit: 20
  groups:
    # The sdr-base / sdr-build digests are pinned in every feeder's
    # Dockerfile, so one base-image rebuild otherwise opens a separate PR
    # per directory. Group them into a single PR across all directories.
    sdr-base-images:
      patterns:
      - "*sdr-base"
      - "*sdr-build"
